destination: docs
url: https://rvpanaro.github.io/spsurv/
template:
  bootstrap: 5
authors:
  Panaro RV:
    href: https://rvpanaro.github.io/
  Mayrink VD:
    href: http://www.est.ufmg.br/~vdinizm/
  Demarqui FN:
    href: http://www.est.ufmg.br/~fndemarqui/
development:
  mode: auto
reference:
- title: "Details"
  contents:
    - spsurv-package
- title: "Fitter functions"
  desc: "Functions for fitting a BP based survival regression model."
  contents:
    - bpph
    - bppo
    - bpaft
    - spbp
    - spbp.default
- title: "Extraction and inference"
  desc: "Coefficients, confidence and credible intervals, residuals, survival curves."
  contents:
    - coef.spbp
    - confint.spbp
    - credint
    - credint.spbp
    - vcov.spbp
    - residuals.spbp
    - survfit.spbp
    - model.matrix.spbp
- title: "Bernstein polynomial basis"
  desc: "Functions for the BP basis."
  contents:
    - bp.basis
    - pw.basis
- title: "Plot and print"
  desc: "S3 methods for spbp objects."
  contents:
    - plot.spbp
    - print.spbp
    - summary.spbp
    - starts_with("print.summary")
